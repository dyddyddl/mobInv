<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모바일 청첩장</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="cover">
    <h1>민수 ♥ 지영</h1>
    <p>2026년 10월 3일 토요일 오후 2시</p>
  </section>

  <section class="invite">
    <p>
      서로 다른 길을 걸어온 두 사람이<br>
      이제 같은 길을 함께 걸어가려 합니다.<br><br>
      소중한 분들을 모시고<br>
      저희의 시작을 함께하고 싶습니다.
    </p>
  </section>

  <section class="info">
    <h2>예식 안내</h2>
    <p>서울 ○○웨딩홀 3층</p>
    <p>오후 2시</p>
  </section>

  <section class="map">
    <h2>오시는 길</h2>
    <a href="https://map.kakao.com" target="_blank">
      지도 보기
    </a>
  </section>

  <section class="gallery">
    <h2>갤러리</h2>
    <img src="photo1.jpg">
    <img src="photo2.jpg">
  </section>

  <section class="rsvp">
    <h2>참석 여부</h2>
    <a href="여기에_구글폼_URL" target="_blank" class="btn">
      참석 여부 전달하기
    </a>
  </section>

</body>
</html>
